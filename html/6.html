<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>

</style>

<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Navbar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
        aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav ms-auto">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
          <a class="nav-link" href="#">Features</a>
          <a class="nav-link" href="#">Pricing</a>
          <a class="nav-link disabled" aria-disabled="true">Disabled</a>
        </div>
      </div>
    </div>
  </nav>
  <div class="d-flex">
    <aside class="sidebar bg-light border-end p-3 w-25 vh-100">
      <ul class="nav nav-pills flex-column gap-1">
        <li class="nav-item">
          <a href="" class="nav-link">Dashboard</a>
        </li>
        <li class="nav-item">
          <a href="" class="nav-link">User</a>
        </li>
        <li class="nav-item">
          <a href="" class="btn btn-primary">Logout</a>
        </li>
      </ul>
    </aside>
    <main class="p-2 w-100 bg-light" style="min-height: 100vh;">
      <h3 class="mb-3 text-dark fw-normal">Profile</h3>
      <div class="card border-0 shadow-sm w-100">
        <div class="bg-primary w-100"
          style="height: 100px; border-top-left-radius: var(--bs-card-inner-border-radius); border-top-right-radius: var(--bs-card-inner-border-radius);">
        </div>

        <div class="card-body text-center p-0 pb-4">

          <div class="mt-4">
            <img src="img/default.png" alt="Profile" class="rounded-circle"
              style="width: 100px; height: 100px; object-fit: cover;">
          </div>

          <h5 class="card-title text-dark fw-bold mt-3 mb-1">Danang Abu Hafid</h5>
          <p class="text-secondary small mb-4">Nomor Anggota: #1</p>

          <hr style="border-color: #ccc; margin: 0 20px;">
          <div class="text-start text-dark px-4 mt-4"
            style="display: grid; grid-template-columns: 100px 20px 1fr; row-gap: 1rem; font-size: 0.875em;">
            <div class="fw-bold ">NIK</div>
            <div class="text-center">:</div>
            <div>3170000000000000</div>

            <div class="fw-bold">No HP</div>
            <div class="text-center">:</div>
            <div>0812-3456-7890</div>

            <div class="fw-bold">Email</div>
            <div class="text-center">:</div>
            <div>email@example.com</div>

            <!-- <div class="d-flex"></div> -->

            <div class="fw-bold">Alamat</div>
            <div class="text-center">:</div>
            <div>Jakarta Pusat</div>

            <div class="fw-bold">Tanggal Lahir</div>
            <div class="text-center">:</div>
            <div>2000-01-01</div>

            <div class="fw-bold">Jenis Kelamin</div>
            <div class="text-center">:</div>
            <div>Laki-laki</div>
          </div>

          <div class="d-flex justify-content-end px-4 mt-3">
            <button class="btn btn-primary btn-sm d-flex align-items-center gap-2 px-3 py-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path
                  d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm-1.146 2.5L3 13.793 2.5 16l2.207-.5 8.646-8.646z" />
              </svg>
              Edit
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
