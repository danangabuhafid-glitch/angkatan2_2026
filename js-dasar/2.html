<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="" method="post">
        <label for="">Masukkan Nama Kota </label>
        <input type="text" id="kota">
        <button type="button" onclick="jasaPengiriman()">Hitung</button>
    </form>
    <p id="total_harga"></p>
    <script>
        function jasaPengiriman() {
            let kota = document.querySelector("#kota").value;
            let berat = 10;
            let tarif = 0;

            if (kota === "Jakarta") {
                tarif = 1000;
            }
            else if (kota === "Bandung") {
                tarif = 50000;
            }
            else {
                tarif = 10000;
            }
            
            const total_harga = tarif * berat;
            document.getElementById("total_harga").innerHTML = `Tarif Anda Rp.${total_harga}`;

        }
