<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Peserta</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
        }

        h2 {
            font-family: 'Courier New', Courier, monospace;
            color: red;
            font-size: 25px;
        }

        p {
            font-family: 'Times New Roman', Times, serif;
            color: yellow;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 2px;
            font-weight: bolder;
            font-size: 20px;
            color: blue;
        }

        input {
            width: 12%;
            padding: 12px 15px;
            border-radius: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: red;
        }

        .btn-submit {
            width: 10%;
            padding: 15px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: greenyellow;
        }

        .btn-reset {
            width: 10%;
            padding: 15px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-reset:hover {
            background-color: aqua;
        }
    </style>
</head>

<body>
    <h2>Pendaftaran Siswa</h2>
    <p>Halaman ini dibuat untuk mendaftarkan siswa murid baru, silahkan isi data diri anda</p>
    <form method="post" action="/html/3.html">
        <div class="form-group">
            <label for="nama">Nama</label>
            <input type="text" placeholder="Masukkan Nama" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" placeholder="Masukkan Email" required>
        </div>
        <div class="form-group">
            <label for="nohp">No Handphone</label>
            <input type="number" placeholder="Masukkan Nomor Handphone" required>
        </div>
        <div class="form-group">
            <input type="reset" class="btn-reset" value="Batal">
            <input type="button" class="btn-submit" value="Simpan">

        </div>
    </form>
</body>

</html>
