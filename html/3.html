<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regist</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: lightblue;
        }

        .card-table
        {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 5px #000;
            width: 80%;
            max-width: 800px;
            margin: 50px auto;
        }

        h2,p {
            text-align: center;

        }

        table {
            width: 100%;
            border-collapse: collapse; 
            margin-top: 20px;
            font-size: 15px;
        }
        
        table thead tr {
            background-color: aqua;
            color: black;
            text-align: center;
        }

        table th,td {
            border-bottom: 1px solid;
            text-align: center;
            padding: 12px 15px;
        }

        .btn-plus {
            text-align: right;
        }
        .btn-tambah {
            display: inline-block;
            padding: 10px 20px;
            background-color: green;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;

        }
        .btn-tambah:hover {
            background-color: greenyellow;
        }
    </style>
</head>

<body>

        <h2>Data Peserta</h2>
